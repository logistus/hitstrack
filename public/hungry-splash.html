<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hungry For Hits — Free Traffic Exchange</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Barlow:wght@400;500;700&family=Barlow+Condensed:wght@700;900&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --red: #c0150f;
      --red-deep: #8a0e09;
      --orange: #f5520c;
      --amber: #f9a31a;
      --cream: #fdf6ec;
      --cream-dark: #f0e4cc;
      --brown: #2d1206;
      --text-main: #1a0a04;
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--cream);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 110% 50%, rgba(245, 82, 12, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at -10% 50%, rgba(192, 21, 15, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 100% 40% at 50% 100%, rgba(249, 163, 26, 0.15) 0%, transparent 70%),
        var(--cream);
    }

    /* diagonal stripe texture */
    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(-45deg,
          transparent,
          transparent 40px,
          rgba(192, 21, 15, 0.025) 40px,
          rgba(192, 21, 15, 0.025) 41px);
    }

    /* ── BIG DECORATIVE CIRCLE ── */
    .deco-ring {
      position: fixed;
      right: -18vw;
      top: 50%;
      transform: translateY(-50%);
      width: 70vw;
      height: 70vw;
      max-width: 800px;
      max-height: 800px;
      border-radius: 50%;
      border: 1px solid rgba(192, 21, 15, 0.12);
      pointer-events: none;
      z-index: 0;
    }

    .deco-ring::before {
      content: '';
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 1px solid rgba(192, 21, 15, 0.08);
    }

    .deco-ring::after {
      content: '';
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(245, 82, 12, 0.07) 0%, transparent 70%);
    }

    /* ── FLAME PARTICLES ── */
    .flames {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .flame {
      position: absolute;
      bottom: -20px;
      font-size: 1.4rem;
      animation: rise var(--dur, 6s) var(--delay, 0s) ease-in infinite;
      opacity: 0;
    }

    @keyframes rise {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.6) rotate(-10deg);
      }

      15% {
        opacity: 0.6;
      }

      80% {
        opacity: 0.3;
      }

      100% {
        opacity: 0;
        transform: translateY(-110vh) scale(1.1) rotate(10deg);
      }
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 10;
      max-width: 680px;
      width: 100%;
      padding: 0 2rem;
      text-align: center;
      animation: pageIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── RANK BADGE ── */
    .rank-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--red);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.4rem 1.1rem;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      margin-bottom: 2rem;
      animation: pageIn 0.9s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .rank-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.6);
      }
    }

    /* ── HEADLINE ── */
    .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-style: italic;
      font-size: clamp(3.8rem, 9.5vw, 7.5rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--text-main);
      margin-bottom: 0.15em;
      animation: pageIn 0.9s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .headline em {
      font-style: normal;
      color: var(--red);
      position: relative;
      display: inline-block;
    }

    .headline em::after {
      content: '';
      position: absolute;
      bottom: 0.04em;
      left: 0;
      right: 0;
      height: 0.06em;
      background: var(--orange);
      transform: scaleX(0);
      transform-origin: left;
      animation: underlineIn 0.7s 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes underlineIn {
      to {
        transform: scaleX(1);
      }
    }

    /* ── SUBHEAD ── */
    .subhead {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.1rem, 2.8vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brown);
      opacity: 0.55;
      margin-bottom: 2.5rem;
      animation: pageIn 0.9s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── STATS ROW ── */
    .stats {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 2.5rem;
      border: 1px solid rgba(192, 21, 15, 0.18);
      background: rgba(253, 246, 236, 0.6);
      backdrop-filter: blur(4px);
      animation: pageIn 0.9s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .stat {
      flex: 1;
      padding: 1rem 1.25rem;
      border-right: 1px solid rgba(192, 21, 15, 0.12);
      text-align: center;
    }

    .stat:last-child {
      border-right: none;
    }

    .stat-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.5rem, 3.5vw, 2.2rem);
      font-weight: 900;
      color: var(--red);
      line-height: 1;
      display: block;
    }

    .stat-key {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brown);
      opacity: 0.5;
      display: block;
      margin-top: 0.3rem;
    }

    /* ── CTA ── */
    .cta-group {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: pageIn 0.9s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .btn-main {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      background: var(--red);
      border: none;
      padding: 1rem 2.8rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, transform 0.15s;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    }

    .btn-main::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 20%, rgba(255, 255, 255, 0.18) 50%, transparent 80%);
      transform: translateX(-100%);
      transition: transform 0.45s;
    }

    .btn-main:hover {
      background: var(--orange);
      transform: translateY(-2px);
    }

    .btn-main:hover::before {
      transform: translateX(100%);
    }

    .btn-ghost {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--red);
      background: transparent;
      border: 1.5px solid rgba(192, 21, 15, 0.35);
      padding: 1rem 2.2rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    }

    .btn-ghost:hover {
      background: rgba(192, 21, 15, 0.06);
      border-color: var(--red);
      transform: translateY(-2px);
    }

    /* ── PERKS ROW ── */
    .perks {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 2rem;
      animation: pageIn 0.9s 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .perk {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brown);
      opacity: 0.5;
    }

    .perk::before {
      content: '✦';
      color: var(--amber);
      font-size: 0.55rem;
      opacity: 1;
    }

    /* ── URL FOOTER ── */
    .site-url {
      position: fixed;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--brown);
      opacity: 0.3;
      z-index: 10;
      white-space: nowrap;
    }

    /* ── INVITED BY BOX ── */
    .invite-box {
      position: fixed;
      bottom: 4.1rem;
      right: 1.1rem;
      z-index: 25;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      background: rgba(253, 246, 236, 0.8);
      border: 1.5px solid rgba(192, 21, 15, 0.18);
      border-radius: 999px;
      padding: 0.4rem 0.9rem 0.4rem 0.4rem;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 16px rgba(192, 21, 15, 0.1);
      animation: pageIn 0.9s 0.75s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .invite-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--amber);
      object-fit: cover;
      display: block;
    }

    .invite-text {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-main);
      opacity: 0.75;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .invite-text strong {
      color: var(--red);
      font-weight: 800;
    }

    @media(max-width:540px) {
      .invite-box {
        bottom: 0.75rem;
        right: 0.75rem;
        padding: 0.32rem 0.75rem 0.32rem 0.32rem;
      }

      .invite-avatar {
        width: 24px;
        height: 24px;
      }

      .invite-text {
        font-size: 0.62rem;
      }
    }

    /* ── RESPONSIVE ── */
    @media(max-width:540px) {

      html,
      body {
        overflow-y: auto;
      }

      body {
        align-items: flex-start;
        padding: 2rem 0 4rem;
      }

      .card {
        padding: 0 1.25rem;
      }

      .stats {
        flex-direction: row;
      }

      .stat {
        padding: 0.75rem 0.5rem;
      }
    }
  </style>
</head>

<body>

  <div class="bg"></div>
  <div class="deco-ring"></div>

  <div class="flames" id="flames"></div>

  <div class="card">

    <div class="rank-badge">
      <span class="rank-dot"></span>
      Ranked #2 Worldwide · May 2026
    </div>

    <h1 class="headline">
      Hungry<br>for <em>Traffic?</em>
    </h1>

    <p class="subhead">Free. Real. Unlimited Website Hits.</p>

    <div class="stats">
      <div class="stat">
        <span class="stat-val">35K+</span>
        <span class="stat-key">Members</span>
      </div>
      <div class="stat">
        <span class="stat-val">Free</span>
        <span class="stat-key">Forever</span>
      </div>
      <div class="stat">
        <span class="stat-val">∞</span>
        <span class="stat-key">Traffic</span>
      </div>
      <div class="stat">
        <span class="stat-val">#2</span>
        <span class="stat-key">Ranked</span>
      </div>
    </div>

    <div class="cta-group">
      <a href="https://hungryforhits.com/signup.php?rid=17" class="btn-main" target="_blank">Get Free Traffic Now</a>
      <a href="https://hungryforhits.com/?rid=17" class="btn-ghost" target="_blank">Learn More</a>
    </div>

    <div class="perks">
      <span class="perk">Real Visitors</span>
      <span class="perk">Tracking Tools</span>
      <span class="perk">Affiliate Program</span>
      <span class="perk">Social Network</span>
      <span class="perk">Your Own Blog</span>
    </div>

  </div>

  <div class="site-url">hungryforhits.com</div>

  <div class="invite-box">
    <img class="invite-avatar" src="https://www.gravatar.com/avatar/0101c72c97a4bef379faf316240a89dd?s=64&d=identicon"
      alt="Sinan">
    <span class="invite-text">Invited by <strong>Sinan</strong></span>
  </div>

  <script>
    const emojis = ['🔥', '🌶️', '🍔', '⚡', '🔥', '🌶️', '🔥'];
    const flames = document.getElementById('flames');
    for (let i = 0; i < 18; i++) {
      const f = document.createElement('div');
      f.className = 'flame';
      f.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      f.style.cssText = `
    left:${Math.random() * 100}%;
    --dur:${5 + Math.random() * 8}s;
    --delay:${Math.random() * 8}s;
    font-size:${0.9 + Math.random() * 1.1}rem;
    opacity:0;
  `;
      flames.appendChild(f);
    }
  </script>

</body>

</html>
